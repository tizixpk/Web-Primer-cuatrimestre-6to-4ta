<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armá tu PC Ideal - Pirez</title>
    <link rel="stylesheet" href="css/armar-pc.css">
</head>
<body>

<header>
    <h1>🖥️ Armá tu PC Ideal</h1>
    <p>Elegí los componentes para tu próxima PC Gamer</p>
    <a href="index.html" class="volver">⬅ Volver al inicio</a>
</header>

<main class="contenedor">

    <form class="formulario">

        <div class="grupo">
            <label>Procesador</label>
            <select>
                <option>Ryzen 5 8600G</option>
                <option>Ryzen 7 8700G</option>
                <option>Intel i5 14600K</option>
                <option>Intel i7 14700K</option>
            </select>
        </div>

        <div class="grupo">
            <label>Memoria RAM</label>
            <select>
                <option>16GB DDR5</option>
                <option>32GB DDR5</option>
                <option>64GB DDR5</option>
            </select>
        </div>

        <div class="grupo">
            <label>Placa de Video</label>
            <select>
                <option>RTX 4060</option>
                <option>RTX 4070</option>
                <option>RTX 5070</option>
                <option>RTX 5080</option>
            </select>
        </div>

        <div class="grupo">
            <label>Almacenamiento</label>
            <select>
                <option>SSD 500GB</option>
                <option>SSD 1TB</option>
                <option>SSD 2TB</option>
            </select>
        </div>

        <div class="grupo">
            <label>Gabinete</label>
            <select>
                <option>Gamer RGB</option>
                <option>Mid Tower</option>
                <option>Full Tower</option>
            </select>
        </div>

        <div class="grupo">
            <label>Presupuesto</label>
            <input type="range" min="500000" max="3000000" step="100000">
        </div>

        <div class="grupo">
            <label>Uso principal</label>
            <select>
                <option>Gaming</option>
                <option>Streaming</option>
                <option>Diseño Gráfico</option>
                <option>Programación</option>
                <option>Uso General</option>
            </select>
        </div>

        <button type="submit" class="btn">Solicitar Presupuesto</button>

    </form>

    <section class="resumen">
        <h2>Resumen</h2>

        <ul>
            <li>✔ Procesador seleccionado</li>
            <li>✔ Memoria RAM</li>
            <li>✔ Placa de video</li>
            <li>✔ Almacenamiento</li>
            <li>✔ Gabinete</li>
        </ul>

        <div class="precio">
            Precio estimado:
            <span>$1.500.000</span>
        </div>
    </section>

</main>

</body>
</html>
